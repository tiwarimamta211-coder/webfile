            <div style={{fontSize:13}}>कोई activity नहीं — modules use करना शुरू करें</div>
          </div>
          :recent.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'9px 0',borderBottom:`1px solid ${C.border}33`}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:a.c,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500}}>{a.l}</div>
                <div className="mono" style={{fontSize:10,color:C.muted}}>{a.s}</div>
              </div>
              <span className="badge tag-blue">{a.t}</span>
            </div>
          ))
        }
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────
   LOGIN SCREEN (NEW — Multi-user)
──────────────────────────────────────────────────*/
function Login({onLogin}){
  const [name,setName]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [mode,setMode]=useState('login');

  // Simple local auth (not server-side — for multi-user data separation)
  const handle=()=>{
    if(!name.trim()){setErr('Username required');return;}
    if(pass.length<4){setErr('Password min 4 characters');return;}
    const users=JSON.parse(localStorage.getItem('caop_users')||'{}');
    if(mode==='register'){
      if(users[name]){setErr('Username already taken');return;}
      users[name]=btoa(pass);
      localStorage.setItem('caop_users',JSON.stringify(users));
      sessionStorage.setItem('caop_user',name);
      onLogin(name);
    }else{
      if(!users[name]||users[name]!==btoa(pass)){setErr('Wrong username or password');return;}
      sessionStorage.setItem('caop_user',name);
      onLogin(name);
    }
  };

  return(
    <div className="login-bg" style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{maxWidth:400,width:'100%'}} className="fade-up">
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{width:60,height:60,background:`linear-gradient(135deg,${C.accent},#4299e1)`,
            borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:26,margin:'0 auto 16px'}}>⬡</div>
          <div className="serif" style={{fontSize:28,color:C.text,marginBottom:4}}>CA Office Pro</div>
          <div className="mono" style={{fontSize:11,color:C.muted,letterSpacing:2}}>VERSION 3 · PRODUCTION</div>
        </div>
        <div className="card" style={{padding:28}}>
          <div style={{display:'flex',gap:0,marginBottom:24,background:C.card2,borderRadius:10,padding:4}}>
            {['login','register'].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr('');}}
                style={{flex:1,padding:'8px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:500,
                  background:mode===m?C.card:'transparent',color:mode===m?C.text:C.sub,
                  fontFamily:'Space Grotesk,sans-serif',transition:'all .2s'}}>
                {m==='login'?'Login':'Register'}
              </button>
            ))}
          </div>
          <Field label="Username" value={name} onChange={setName} placeholder="yourname"/>
          <Field label="Password" value={pass} onChange={setPass} type="password" placeholder="min 4 characters"/>
          {err&&<div style={{fontSize:12,color:C.red,marginBottom:12,padding:'8px 12px',background:`${C.red}11`,borderRadius:8}}>⚠ {err}</div>}
          <Btn full onClick={handle}>{mode==='login'?'Login →':'Register & Start →'}</Btn>
          <div style={{marginTop:16,padding:12,background:C.card2,borderRadius:9}}>
            <div className="mono" style={{fontSize:10,color:C.muted,marginBottom:4}}>DEMO LOGIN</div>
            <div style={{fontSize:12,color:C.sub}}>Username: <span className="mono" style={{color:C.accent}}>demo</span> · Password: <span className="mono" style={{color:C.accent}}>demo123</span></div>
          </div>
        </div>
        <div style={{textAlign:'center',marginTop:16,fontSize:11,color:C.muted}}>
          Data only in your browser · No server · 🔒 Private
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────
   NAV CONFIG
──────────────────────────────────────────────────*/
const NAV=[
  {id:'dashboard',ico:'⬡',l:'Dashboard',h:'डैशबोर्ड'},
  {id:'clients',ico:'👥',l:'Client Manager',h:'क्लाइंट डेटाबेस',badge:'NEW'},
  {id:'tally',ico:'📄',l:'Tally AI Entry',h:'Tally XML Export',badge:'AI'},
  {id:'gst',ico:'🚀',l:'GST Filing',h:'Real JSON Export',badge:'REAL'},
  {id:'tds',ico:'💰',l:'TDS Manager',h:'TDS/TCS',badge:''},
  {id:'reports',ico:'📊',l:'Reports',h:'Export Ready'},
  {id:'sync',ico:'☁',l:'Backup & Sync',h:'Import/Export',badge:'NEW'},
  {id:'ai',ico:'✦',l:'CA AI Assistant',h:'Hindi/English AI',badge:'AI'},
];

/* ────────────────────────────────────────────────
   MAIN APP
──────────────────────────────────────────────────*/
function App(){
  const [user,setUser]=useState(()=>sessionStorage.getItem('caop_user'));
  const [active,setActive]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(window.innerWidth>768);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [clients,setClients]=useState(()=>STORE.get('clients',[]));
  const {toasts,toast}=useToast();
  const [confirm,setConfirm]=useState(null);

  useEffect(()=>{
    // Pre-create demo user
    const users=JSON.parse(localStorage.getItem('caop_users')||'{}');
    if(!users['demo']){users['demo']=btoa('demo123');localStorage.setItem('caop_users',JSON.stringify(users));}
    const on=()=>setIsOnline(true);
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    const resize=()=>{if(window.innerWidth<768)setSideOpen(false);};
    window.addEventListener('resize',resize);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);window.removeEventListener('resize',resize);};
  },[]);

  useEffect(()=>{STORE.set('clients',clients);},[clients]);

  if(!user)return <Login onLogin={u=>{setUser(u);}}/>;

  const logout=()=>{
    setConfirm({title:'Logout?',msg:'Session खत्म होगी। Data safe रहेगा।',
      onOk:()=>{sessionStorage.removeItem('caop_user');setUser(null);setConfirm(null);}});
  };

  const renderContent=()=>{
    const p={toast,isOnline,clients,setClients};
    switch(active){
      case 'dashboard': return <Dashboard setActive={setActive} clients={clients}/>;
      case 'clients':   return <ClientModule {...p}/>;
      case 'tally':     return <TallyModule {...p}/>;
      case 'gst':       return <AutoGSTModule {...p}/>;
      case 'tds':       return <TDSModule {...p}/>;
      case 'reports':   return <ReportsModule/>;
      case 'sync':      return <SyncModule {...p} user={user}/>;
      case 'ai':        return <AIModule {...p}/>;
      default:return <div style={{textAlign:'center',padding:60,color:C.muted}}><div style={{fontSize:40,marginBottom:12}}>🚧</div><div style={{fontSize:16}}>Coming Soon</div></div>;
    }
  };

  const cur=NAV.find(n=>n.id===active);

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:C.bg}}>
      <Toasts toasts={toasts}/>
      {sideOpen&&window.innerWidth<=768&&(
        <div onClick={()=>setSideOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:199}}/>
      )}

      {/* SIDEBAR */}
      <div className="sidebar" style={{
        width:sideOpen?238:58,background:C.surf,borderRight:`1px solid ${C.border}`,
        transition:'width .3s ease',flexShrink:0,display:'flex',flexDirection:'column',
        overflow:'hidden',zIndex:200}}>
        <div style={{padding:'14px 12px',borderBottom:`1px solid ${C.border}`,
          display:'flex',alignItems:'center',gap:10,minHeight:58}}>
          <div style={{width:32,height:32,flexShrink:0,borderRadius:9,
            background:`linear-gradient(135deg,${C.accent},#4299e1)`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>⬡</div>
          {sideOpen&&(
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.accent,letterSpacing:.5,whiteSpace:'nowrap'}}>CA OFFICE</div>
              <div className="mono" style={{fontSize:8,color:C.muted,letterSpacing:2}}>PRO v3</div>
            </div>
          )}
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'6px 0'}}>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${active===n.id?' active':''}`}
              onClick={()=>{setActive(n.id);if(window.innerWidth<=768)setSideOpen(false);}}
              title={!sideOpen?n.l:''}
              style={{padding:'10px 12px',display:'flex',alignItems:'center',gap:10,
                borderLeft:`3px solid ${active===n.id?C.accent:'transparent'}`,
                background:active===n.id?C.accentDim:'transparent'}}>
              <span style={{fontSize:15,flexShrink:0,width:22,textAlign:'center',
                color:active===n.id?C.accent:C.sub}}>{n.ico}</span>
              {sideOpen&&(
                <>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:active===n.id?C.text:C.sub,fontWeight:active===n.id?600:400,whiteSpace:'nowrap'}}>{n.l}</div>
                    <div className="mono" style={{fontSize:9,color:C.muted}}>{n.h}</div>
                  </div>
                  {n.badge&&<span style={{fontSize:8,background:n.badge==='AI'?C.accent:n.badge==='REAL'?C.green:C.orange,
                    color:'#07090f',padding:'2px 6px',borderRadius:10,
                    fontFamily:'JetBrains Mono,monospace',fontWeight:700,flexShrink:0}}>{n.badge}</span>}
                </>
              )}
            </div>
          ))}
        </div>

        {sideOpen&&(
          <div style={{padding:12,borderTop:`1px solid ${C.border}`}}>
            <div style={{background:C.accentDim,borderRadius:9,padding:'10px 12px',marginBottom:8}}>
              <div className="mono" style={{fontSize:9,color:C.accent,marginBottom:2}}>LOGGED IN AS</div>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>{user}</div>
            </div>
            <button onClick={logout} style={{width:'100%',background:C.card2,border:`1px solid ${C.border}`,
              color:C.sub,padding:'8px',borderRadius:9,cursor:'pointer',fontSize:12,
              fontFamily:'Space Grotesk,sans-serif'}}>Logout</button>
          </div>
        )}
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {/* Topbar */}
        <div style={{background:C.surf,borderBottom:`1px solid ${C.border}`,
          padding:'0 18px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setSideOpen(s=>!s)}
              style={{background:C.card,border:`1px solid ${C.border}`,color:C.sub,
                padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:15}}>☰</button>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{cur?.l}</div>
              <div className="mono" style={{fontSize:9,color:C.muted}}>{cur?.h}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div className={`mono ${isOnline?'':'pulse-anim'}`} style={{fontSize:10,color:isOnline?C.green:C.orange}}>
              {isOnline?'● Online':'● Offline'}
            </div>
            <div className="hide-sm mono" style={{fontSize:10,color:C.muted}}>FY 2025-26</div>
            <div style={{width:32,height:32,background:C.accentDim,border:`1px solid ${C.accent}44`,
              borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:12,color:C.accent,fontWeight:700,cursor:'pointer'}}
              onClick={logout} title="Logout">
              {user.slice(0,2).toUpperCase()}
            </div>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:'auto',padding:18}}>
          {renderContent()}
        </div>
      </div>

      <Confirm open={!!confirm} title={confirm?.title} msg={confirm?.msg}
        onOk={confirm?.onOk} onCancel={()=>setConfirm(null)}/>
    </div>
  );
}

// Register demo user on first load
const users=JSON.parse(localStorage.getItem('caop_users')||'{}');
if(!users['demo']){users['demo']=btoa('demo123');localStorage.setItem('caop_users',JSON.stringify(users));}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
